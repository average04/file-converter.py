{% extends "base.html" %}
{% block content %}

<div class="card">
  <h2>Settings</h2>

  <div id="save-msg" class="alert alert-success" style="display:none">Settings saved!</div>

  <div class="form-group">
    <label for="backup-path">Default Backup Folder</label>
    <input type="text" id="backup-path" placeholder="e.g. C:\Users\You\Documents\iPhoneBackups">
  </div>

  <div class="form-group" style="display:flex; align-items:center; gap:10px">
    <input type="checkbox" id="wifi-enabled">
    <label for="wifi-enabled" style="margin:0; cursor:pointer">Enable Wi-Fi device discovery</label>
  </div>

  <button class="btn btn-primary" onclick="saveSettings()">Save</button>
</div>

{% endblock %}

{% block scripts %}
<script>
  fetch("/api/settings").then(r => r.json()).then(s => {
    document.getElementById("backup-path").value   = s.backup_path;
    document.getElementById("wifi-enabled").checked = s.wifi_enabled;
  });

  function saveSettings() {
    const data = {
      backup_path:  document.getElementById("backup-path").value.trim(),
      wifi_enabled: document.getElementById("wifi-enabled").checked,
    };
    fetch("/api/settings", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    }).then(() => {
      const msg = document.getElementById("save-msg");
      msg.style.display = "block";
      setTimeout(() => msg.style.display = "none", 2500);
    });
  }
</script>
{% endblock %}
