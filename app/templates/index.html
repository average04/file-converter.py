{% extends "base.html" %}
{% block content %}

<div class="converter-wrap">
  <h1>Convert your file</h1>
  <p class="subtitle">PDF to Word &nbsp;·&nbsp; Word to PDF</p>

  <!-- Mode selector -->
  <div class="mode-selector">
    <button class="mode-btn active" data-mode="pdf_to_docx" onclick="setMode('pdf_to_docx', this)">
      PDF → Word
    </button>
    <button class="mode-btn" data-mode="docx_to_pdf" onclick="setMode('docx_to_pdf', this)">
      Word → PDF
    </button>
  </div>

  <!-- Output folder -->
  <div class="folder-row">
    <div class="folder-label">Save to:</div>
    <div class="folder-path" id="folder-path">Loading…</div>
    <button class="btn btn-secondary btn-sm" onclick="pickFolder()">Change</button>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone"
       ondragover="onDragOver(event)"
       ondragleave="onDragLeave(event)"
       ondrop="onDrop(event)"
       onclick="document.getElementById('file-input').click()">
    <div class="drop-icon" id="drop-icon">📄</div>
    <p class="drop-text" id="drop-text">Drag & drop your file here</p>
    <p class="drop-hint" id="drop-hint">or click to browse</p>
    <input type="file" id="file-input" style="display:none" onchange="onFileSelected(this)">
  </div>

  <!-- Error message -->
  <div class="alert alert-error" id="error-msg" style="display:none"></div>

  <!-- Success message -->
  <div class="alert alert-success" id="success-msg" style="display:none">
    ✅ <strong>Success!</strong> File saved to "<span id="success-path"></span>"
  </div>

  <!-- Convert button -->
  <button class="btn btn-primary btn-convert" id="btn-convert" onclick="convert()" disabled>
    Convert
  </button>

  <!-- Loading state -->
  <div class="loading" id="loading" style="display:none">
    <div class="spinner"></div>
    <span>Converting…</span>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
  let selectedFile = null;
  let currentMode  = "pdf_to_docx";

  // Load current output folder on startup
  fetch("/api/output-dir").then(r => r.json()).then(d => {
    document.getElementById("folder-path").textContent = d.path;
  });

  async function pickFolder() {
    const resp = await fetch("/pick-folder", { method: "POST" });
    const data = await resp.json();
    if (data.path) {
      document.getElementById("folder-path").textContent = data.path;
    }
  }

  const accept = {
    pdf_to_docx: ".pdf",
    docx_to_pdf: ".docx,.doc",
  };

  function setMode(mode, btn) {
    currentMode = mode;
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("file-input").accept = accept[mode];
    clearFile();
  }

  function clearFile() {
    selectedFile = null;
    document.getElementById("drop-icon").textContent = "📄";
    document.getElementById("drop-text").textContent  = "Drag & drop your file here";
    document.getElementById("drop-hint").textContent  = "or click to browse";
    document.getElementById("btn-convert").disabled = true;
    document.getElementById("error-msg").style.display = "none";
    document.getElementById("file-input").value = "";
  }

  function setFile(file) {
    selectedFile = file;
    document.getElementById("drop-icon").textContent = "✅";
    document.getElementById("drop-text").textContent  = file.name;
    document.getElementById("drop-hint").textContent  = (file.size / 1024 / 1024).toFixed(2) + " MB";
    document.getElementById("btn-convert").disabled = false;
    document.getElementById("error-msg").style.display = "none";
  }

  function onFileSelected(input) {
    if (input.files[0]) setFile(input.files[0]);
  }

  function onDragOver(e) {
    e.preventDefault();
    document.getElementById("drop-zone").classList.add("drag-over");
  }

  function onDragLeave(e) {
    document.getElementById("drop-zone").classList.remove("drag-over");
  }

  function onDrop(e) {
    e.preventDefault();
    document.getElementById("drop-zone").classList.remove("drag-over");
    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg;
    el.style.display = "block";
  }

  async function convert() {
    if (!selectedFile) return;

    document.getElementById("btn-convert").style.display = "none";
    document.getElementById("loading").style.display     = "flex";
    document.getElementById("error-msg").style.display   = "none";
    document.getElementById("success-msg").style.display = "none";

    const form = new FormData();
    form.append("file", selectedFile);
    form.append("mode", currentMode);

    try {
      const resp = await fetch("/convert", { method: "POST", body: form });
      const data = await resp.json();

      if (!resp.ok) {
        showError(data.error || "Conversion failed");
        return;
      }

      document.getElementById("success-path").textContent = data.path;
      document.getElementById("success-msg").style.display = "block";
      document.getElementById("folder-path").textContent = data.folder;
      clearFile(); // resets drop zone but success-msg stays visible
    } catch (err) {
      showError("Something went wrong. Please try again.");
    } finally {
      document.getElementById("btn-convert").style.display = "block";
      document.getElementById("loading").style.display     = "none";
    }
  }

  function openFolder() {
    fetch("/open-folder", { method: "POST" });
  }
</script>
{% endblock %}
